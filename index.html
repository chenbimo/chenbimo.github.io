<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
<title>陈随易</title>
<meta charset="utf-8" />
<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
<meta name="renderer" content="webkit" />
<meta name="Author" content="bimostyle@qq.com" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no" />
<link rel="shortcut icon" type="image/x-icon" href="./public/static/images/bagua.png" />
<link rel="stylesheet" type="text/css" href="./public/static/css/normalize.css" />
<link rel="stylesheet" type="text/css" href="./public/public.min.css" />
<link rel="stylesheet" type="text/css" href="./index.min.css" />

    </head>
    <body>
        <div class="container">
            <div class="self"></div>
            <!-- 灯吊线 -->
            <div class="lamp-holder"></div>
            <!-- 灯 -->
            <div class="lamp"></div>
            <!-- 光 -->
            <div class="light"></div>
            <!-- 墙 -->
            <div class="wall"></div>
            <!-- 桌子 -->
            <div class="desk"></div>
            <!-- 电脑 -->
            <div class="screen">
                <div class="sidebar">
                    <div class="h1"></div>
                    <div class="h2"></div>
                </div>
                <div class="main">
                    <!-- <div class="search"></div> -->
                    <div class="pen pen1">工具</div>
                    <div class="pen pen2">导航</div>
                    <div class="pen pen3">编程</div>
                    <div class="pen pen4">生活</div>
                    <div class="pen pen5">电影</div>
                    <div class="pen pen6">小说</div>
                    <div class="pen pen7">人物</div>
                    <div class="pen pen8">其他</div>
                    <div class="pen pen9">友链</div>
                </div>
            </div>
            <!-- 鼠标 -->
            <div class="mouse"></div>
            <!-- 键盘 -->
            <div class="keyboard"></div>
            <!-- 被子 -->
            <div class="cup">
                <div class="tea"></div>
                <div class="steam"></div>
            </div>
            <!-- 植物 -->
            <div class="plant">
                <div class="leaf1"></div>
                <div class="leaf2"></div>
                <div class="leaf3"></div>
            </div>
        </div>
